name: team-nexus

services:
  atlas:
    build:
      context: ./docker
    image: team-nexus-agent:latest
    container_name: hermes-atlas
    restart: unless-stopped
    environment:
      HERMES_HOME: /opt/data
      HERMES_KANBAN_HOME: /shared/kanban
      AGENT_NAME: Atlas
      AGENT_ROLE: Orchestrator / Chief of Staff
    env_file:
      - ./agents/atlas/home/.env
    volumes:
      # Hermes Docker docs use /opt/data for all durable user data: config, API keys, sessions, skills, memories.
      - ./agents/atlas/home:/opt/data
      # Agent-owned workspace. Configure terminal.cwd=/workspace in config.yaml.
      - ./agents/atlas/workspace:/workspace
      # Shared readonly material visible to all agents.
      - ./shared/project:/shared/project:ro
      # Shared writable Kanban board root (SQLite DB, workspaces, worker logs).
      - ./shared/kanban:/shared/kanban
      - ./shared/skills:/shared/skills:ro
      - ./shared/mcp:/shared/mcp:ro
    ports:
      - "127.0.0.1:8642:8642"
    command: ["gateway", "run"]


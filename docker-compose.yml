name: team-nexus

services:
  atlas:
    build:
      context: ./docker
    image: team-nexus-agent:latest
    container_name: hermes-atlas
    restart: unless-stopped
    environment:
      HERMES_HOME: /opt/data
      HERMES_KANBAN_HOME: /shared/kanban
      AGENT_NAME: Atlas
      AGENT_ROLE: Orchestrator / Chief of Staff
    env_file:
      - ./.env
    volumes:
      # Hermes Docker docs use /opt/data for all durable user data: config, auth state, sessions, skills, memories.
      - ./agents/atlas/home:/opt/data
      # Agent-owned workspace. Configure terminal.cwd=/workspace in config.yaml.
      - ./agents/atlas/workspace:/workspace
      # Shared project context is read-only, except the artifacts submount below is writable for handoffs.
      - ./shared/project:/shared/project:ro
      - ./shared/project/artifacts:/shared/project/artifacts:rw
      # Shared writable Kanban board root (SQLite DB, workspaces, worker logs).
      - ./shared/kanban:/shared/kanban:rw
      - ./shared/skills:/shared/skills:ro
      - ./shared/mcp:/shared/mcp:ro
    ports:
      - "127.0.0.1:8642:8642"
    command: ["gateway", "run"]


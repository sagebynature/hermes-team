name: team-nexus

services:
  kanban-notifier:
    image: team-nexus-agent:latest
    container_name: hermes-kanban-notifier
    restart: unless-stopped
    profiles: ["kanban"]
    working_dir: ${PWD}
    entrypoint: ["/usr/bin/tini", "-g", "--"]
    environment:
      HERMES_HOME: /tmp/hermes-notifier-home
      HERMES_KANBAN_HOME: ${PWD}/shared/kanban
      HERMES_UID: ${TEAM_NEXUS_UID:-10000}
      HERMES_GID: ${TEAM_NEXUS_GID:-10000}
      AGENT_NAME: Kanban Notifier
      AGENT_ROLE: Kanban mission notification tailer
    env_file:
      - ./.env
    volumes:
      # The notifier only needs repo/shared DB access plus env for optional Discord delivery.
      # It does not need the Docker socket because it never spawns workers.
      - ${PWD}:${PWD}
    command:
      - bash
      - -lc
      - >-
        umask 0002 &&
        deliver_flag="" &&
        if [ "$${KANBAN_NOTIFIER_DELIVER:-0}" = "1" ]; then deliver_flag="--deliver"; fi &&
        python3 scripts/kanban-mission-notifier.py --daemon $${deliver_flag}
        --interval "$${KANBAN_NOTIFIER_INTERVAL:-10}"
        --limit "$${KANBAN_NOTIFIER_LIMIT:-100}"

  kanban-dispatcher:
    image: team-nexus-agent:latest
    container_name: hermes-kanban-dispatcher
    restart: unless-stopped
    profiles: ["kanban"]
    working_dir: ${PWD}
    entrypoint: ["/usr/bin/tini", "-g", "--"]
    environment:
      HERMES_HOME: /tmp/hermes-dispatcher-home
      HERMES_KANBAN_HOME: ${PWD}/shared/kanban
      HERMES_UID: ${TEAM_NEXUS_UID:-10000}
      HERMES_GID: ${TEAM_NEXUS_GID:-10000}
      AGENT_NAME: Kanban Dispatcher
      AGENT_ROLE: Compose-aware Kanban task router
      COMPOSE: docker compose -f docker-compose.yml -f docker-compose.agents.generated.yml -f docker-compose.dashboards.generated.yml
    env_file:
      - ./.env
    volumes:
      # Mount the repo at the caller's current repo path so nested
      # `docker compose run` resolves bind mounts to host-valid paths without hardcoding a user home.
      - ${PWD}:${PWD}
      # Docker-outside-of-Docker: use the host Docker daemon to spawn workers.
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - bash
      - -lc
      - >-
        umask 0002 &&
        include_atlas_flag= &&
        if [ "$${KANBAN_DISPATCH_INCLUDE_ATLAS:-1}" != "0" ]; then include_atlas_flag=--include-atlas; fi &&
        python3 scripts/kanban-compose-dispatcher.py --daemon $${include_atlas_flag}
        --interval "$${KANBAN_DISPATCH_INTERVAL:-60}"
        --max-tasks "$${KANBAN_DISPATCH_MAX_TASKS:-1}"
        --worker-timeout "$${KANBAN_DISPATCH_WORKER_TIMEOUT:-900}"

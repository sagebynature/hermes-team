name: team-nexus

services:
  kanban-dispatcher:
    image: team-nexus-agent:latest
    container_name: hermes-kanban-dispatcher
    restart: unless-stopped
    profiles: ["dispatcher"]
    working_dir: ${PWD}
    entrypoint: ["/usr/bin/tini", "-g", "--"]
    environment:
      HERMES_HOME: /tmp/hermes-dispatcher-home
      HERMES_KANBAN_HOME: ${PWD}/shared/kanban
      HERMES_UID: ${TEAM_NEXUS_UID:-10000}
      HERMES_GID: ${TEAM_NEXUS_GID:-10000}
      AGENT_NAME: Kanban Dispatcher
      AGENT_ROLE: Compose-aware Kanban task router
      COMPOSE: docker compose -f docker-compose.yml -f docker-compose.agents.generated.yml -f docker-compose.dashboards.generated.yml
    env_file:
      - ./.env
    volumes:
      # Mount the repo at the caller's current repo path so nested
      # `docker compose run` resolves bind mounts to host-valid paths without hardcoding a user home.
      - ${PWD}:${PWD}
      # Docker-outside-of-Docker: use the host Docker daemon to spawn workers.
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - bash
      - -lc
      - >-
        umask 0002 &&
        python3 scripts/kanban-compose-dispatcher.py --daemon
        --interval "$${KANBAN_DISPATCH_INTERVAL:-60}"
        --max-tasks "$${KANBAN_DISPATCH_MAX_TASKS:-1}"
        --worker-timeout "$${KANBAN_DISPATCH_WORKER_TIMEOUT:-900}"

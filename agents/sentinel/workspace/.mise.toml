# Per-agent mise config. Edit this to add tools needed by this agent's workspace.
# The custom Docker image provides global node@lts via mise and uv/uvx via Astral's installer.

[tools]
python = "3.12"
node = "lts"
go = "latest"
rust = "latest"
bun = "latest"

[env]
HERMES_AGENT_WORKSPACE = "/workspace"

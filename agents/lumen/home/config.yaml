# Hermes config for Lumen — UX / Design Lead
# Mounted into the Docker container at /opt/data/config.yaml.

model:
  provider: openrouter
  default: google/gemma-4-31b-it
  context_length: 200000

# Keep the default Hermes CLI toolset and opt into Kanban tools.
# Kanban tool handlers are runtime-gated by Hermes: they appear for
# dispatcher-spawned workers, or when this config includes kanban for
# orchestrator-style routing.
toolsets:
  - hermes-cli
  - kanban

agent:
  max_turns: 90
  tool_use_enforcement: true

terminal:
  backend: local
  cwd: /workspace
  timeout: 180

memory:
  memory_enabled: true
  user_profile_enabled: true

compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2

auxiliary:
  vision:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  web_extract:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  compression:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  session_search:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  skills_hub:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  approval:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  mcp:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  title_generation:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  curator:
    provider: openrouter
    model: google/gemini-2.5-flash-lite

display:
  tool_progress: true
  show_cost: true

approvals:
  mode: smart

security:
  redact_secrets: true

privacy:
  redact_pii: false

# All agents share the board at HERMES_KANBAN_HOME=/shared/kanban.
# Only Atlas runs the embedded dispatcher so multiple gateways do not race
# against the same SQLite board. Other agents can still use /kanban and
# Kanban CLI/tools to create/comment/inspect tasks.
kanban:
  dispatch_in_gateway: false
  dispatch_interval_seconds: 60

# Role metadata for your own scripts/router.
startup_agent:
  name: Lumen
  slug: lumen
  role: UX / Design Lead
  description: Owns UX flows, interface structure, onboarding, design critique, and UI copy.
  soul_file: /opt/data/SOUL.md
  agents_file: /opt/data/AGENTS.md
  workspace: /workspace
  inbox: /workspace/inbox
  outbox: /workspace/outbox
  artifacts: /workspace/artifacts

# MCP servers can be added with:
# docker compose run --rm lumen mcp add <name> --command "..."
# Then inspect the generated config and template it here.

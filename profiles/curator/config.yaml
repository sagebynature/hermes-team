# Hermes config for Curator.
# Hand-maintained canonical profile config; staged by scripts/render-profile-spec.py.

model:
  provider: openrouter
  default: google/gemma-4-31b-it
  context_length: 200000

terminal:
  backend: local
  cwd: /workspaces/curator
  timeout: 180
  env_passthrough:
    - GITHUB_TOKEN
    - CONTEXT7_API_KEY
    - STITCH_API_KEY

checkpoints:
  enabled: true
  max_snapshots: 50

gateway:
  enabled: false

kanban:
  enabled: true

skills:
  external_dirs:
    - /shared/skills
  template_vars: true
  inline_shell: false

delegation:
  provider: openrouter
  model: google/gemma-4-31b-it
  inherit_mcp_toolsets: true
  max_iterations: 50
  child_timeout_seconds: 600
  reasoning_effort: ""
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: false
  subagent_auto_approve: true


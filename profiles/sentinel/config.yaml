# Hermes config for Sentinel — Code Review / QA / Security Assessment
# Mounted into the Docker container at /opt/data/config.yaml.

model:
  provider: openrouter
  default: google/gemma-4-31b-it
  context_length: 200000

# Keep the default Hermes CLI toolset and opt into Kanban tools.
# Kanban tool handlers are runtime-gated by Hermes: they appear for
# dispatcher-spawned workers, or when this config includes kanban for
# orchestrator-style routing.
toolsets:
  - hermes-cli
  - kanban

agent:
  max_turns: 90
  tool_use_enforcement: true

terminal:
  backend: local
  cwd: /workspaces/sentinel
  timeout: 180
  env_passthrough:
    - GITHUB_TOKEN
    - CONTEXT7_API_KEY
    - STITCH_API_KEY

memory:
  memory_enabled: true
  user_profile_enabled: true

compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2

skills:
  external_dirs:
    - /shared/skills
  template_vars: true

auxiliary:
  vision:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  web_extract:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  compression:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  session_search:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  skills_hub:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  approval:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  mcp:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  title_generation:
    provider: openrouter
    model: google/gemini-2.5-flash-lite
  curator:
    provider: openrouter
    model: google/gemini-2.5-flash-lite

display:
  tool_progress: true
  show_cost: true

# Web dashboard identity. Hermes expands ${AGENT_NAME}/${AGENT_ROLE} from the dashboard container environment at runtime.
dashboard:
  theme: team-nexus
  agent_name: ${AGENT_NAME}
  agent_role: ${AGENT_ROLE}
  title: ${AGENT_NAME} Dashboard
  accent_colors:
    primary: "#FFD35A"
    secondary: "#5F6670"

approvals:
  mode: smart

security:
  redact_secrets: true

privacy:
  redact_pii: false

# All agents share the board at HERMES_KANBAN_HOME=/shared/kanban.
# Only Atlas runs the embedded dispatcher so multiple gateways do not race
# against the same SQLite board. Other agents can still use /kanban and
# Kanban CLI/tools to create/comment/inspect tasks.
kanban:
  dispatch_in_gateway: false
  dispatch_interval_seconds: 60

# Role metadata for your own scripts/router.
startup_agent:
  name: Sentinel
  slug: sentinel
  role: Code Review / QA / Security Assessment
  description: Owns code review, QA testing strategy, release readiness, and security assessment.
  soul_file: /opt/data/SOUL.md
  agents_file: /opt/data/AGENTS.md
  workspace: /workspace
  inbox: /workspace/inbox
  outbox: /workspace/outbox
  artifacts: /workspace/artifacts

# MCP servers can be added with:
# docker compose run --rm sentinel mcp add <name> --command "..."
# Then inspect the generated config and template it here.

# Voice mode: Groq STT + free Edge TTS. GROQ_API_KEY is supplied by repo .env via Docker Compose env_file.
tts:
  provider: edge
  edge:
    voice: en-US-AriaNeural

stt:
  enabled: true
  provider: groq
  local:
    model: base
    language: ""
  openai:
    model: whisper-1
  mistral:
    model: voxtral-mini-latest

voice:
  record_key: ctrl+b
  max_recording_seconds: 120
  auto_tts: false
  beep_enabled: true
  silence_threshold: 200
  silence_duration: 3.0

delegation:
  provider: openrouter
  model: google/gemma-4-31b-it
  inherit_mcp_toolsets: true
  max_iterations: 50
  child_timeout_seconds: 600
  reasoning_effort: ""
  max_concurrent_children: 3
  max_spawn_depth: 1
  orchestrator_enabled: false
  subagent_auto_approve: true


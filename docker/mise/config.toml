# Global mise configuration baked into the team-nexus image.
# Profile/workspace-specific overrides can live in the active workspace .mise.toml.

[settings]
yes = true
experimental = true
idiomatic_version_file_enable_tools = ["node", "python"]

[tools]
# Node is needed for many MCP servers invoked through `npx`.
node = "lts"

# uv is installed in the Dockerfile via Astral's installer instead of mise.
# Reason: mise's aqua backend can fail Docker builds when GitHub artifact
# attestation metadata for astral-sh/uv is unavailable or mismatched.
